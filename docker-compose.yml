version: '3.8'

services:
  auth:
    build: ./auth_service
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-supersecret}
    restart: unless-stopped

  user:
    build: ./user_service
    ports:
      - "8001:8000"  # внутри контейнера всегда 8000
    environment:
      - SECRET_KEY=${SECRET_KEY:-supersecret}
      - USER_SERVICE_URL=http://user:8000
    depends_on:
      - auth
    restart: unless-stopped

  order:
    build: ./order_service
    ports:
      - "8002:8000"
    environment:
      - USER_SERVICE_URL=http://user:8000
    depends_on:
      - user
    restart: unless-stopped

networks:
  default:
    driver: bridge
services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
    restart: unless-stopped

  auth:
    build: .
    expose:
      - "8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
    command: uvicorn auth_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db

  user:
    build: .
    expose:
      - "8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
    command: uvicorn user_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db

  order:
    build: .
    expose:
      - "8000"
    environment:
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - SECRET_KEY=${SECRET_KEY}
    command: uvicorn order_service.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - user

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  postgres_data: